spring:
  application:
    name: user-management-service
  
  # ローカル開発用データベース設定
  datasource:
    url: jdbc:postgresql://postgres:5432/skishop_user
    username: skishop_user
    password: password
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      idle-timeout: 300000
      connection-timeout: 20000
      validation-timeout: 5000
      leak-detection-threshold: 60000
      auto-commit: false
  
  # JPA設定
  jpa:
    hibernate:
      ddl-auto: create-drop # ローカルでは自動作成
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        '[format_sql]': true
        '[use_sql_comments]': true
        '[jdbc.batch_size]': 20
        '[order_inserts]': true
        '[order_updates]': true
        '[globally_quoted_identifiers]': false
        '[globally_quoted_identifiers_skip_column_definitions]': true
        connection:
          auto-commit: false
    open-in-view: false
    defer-datasource-initialization: true
  
  # Transaction management
  transaction:
    default-timeout: 30
    rollback-on-commit-failure: true
  
  # Flyway無効化（JPA自動作成を使用）
  flyway:
    enabled: false
  
  # Redis設定
  data:
    redis:
      host: redis
      port: 6379
      password: 
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

# サーバー設定
server:
  port: 8081
  servlet:
    context-path: /api

# 管理用エンドポイント設定
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,mappings
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true

# ログ設定（ローカル用）
logging:
  level:
    '[com.skishop.user]': DEBUG
    '[org.springframework.security]': INFO
    '[org.springframework.web]': INFO
    '[org.hibernate.SQL]': DEBUG
    '[org.hibernate.type.descriptor.sql.BasicBinder]': TRACE
    '[org.springframework.data.redis]': DEBUG
    '[io.github.resilience4j]': DEBUG
    root: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"

# アプリケーション固有設定（ローカル）
skishop:
  # 認証機能フィーチャーフラグ（認証機能を有効化）
  authfunc:
    enable: ${SKISHOP_AUTH_ENABLE:true}
    
  user:
    # パスワード設定（ローカルでは緩和）
    password:
      min-length: 4
      max-length: 100
      require-uppercase: false
      require-lowercase: false
      require-digits: false
      require-special-chars: false
    
    # メール認証設定（ローカルでは無効）
    email-verification:
      token-validity: 24 # 時間
      base-url: http://localhost:3000
      
    # アカウントロック設定（ローカルでは無効）
    account-lock:
      max-failed-attempts: 999
      lock-duration: 1 # 分
    
    # 通知設定（ローカルでは無効）
    notification:
      email:
        enabled: false
  
  # Event Propagation Configuration for Local Development
  runtime:
    event-propagation-enabled: true
    event-broker-type: redis
    event-max-retries: 3
    event-timeout-ms: 30000
    event-redis-key-prefix: skishop-local
    event-concurrency: 2
    event-persistence-enabled: true
    processed-event-retention-days: 7
    debug-mode: true
    environment: local

# API文書化設定
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
  packages-to-scan: com.skishop.user.controller


